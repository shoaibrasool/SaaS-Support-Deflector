<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaaS Support Deflector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- Mobile toggle -->
  <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">S</div>
        <span class="sidebar-logo-text">Support Deflector</span>
      </div>
      <div class="sidebar-search">
        <div class="search-bar" id="search-bar">
          <svg class="search-bar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            type="text"
            class="search-bar-input"
            id="search-input"
            placeholder="Search articles..."
            autocomplete="off"
          />
          <kbd class="search-bar-hint">/</kbd>
        </div>
      </div>
    </div>

    <nav class="categories" id="categories">
      <div class="categories-header">Categories</div>
      <div id="categories-list"></div>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="main-inner">

      <div class="results-header">
        <h1 class="results-header-title" id="results-title">Search</h1>
        <p class="results-header-subtitle" id="results-subtitle">
          Browse knowledge base articles
        </p>
      </div>

      <div class="results-area" id="results-area">

        <!-- Empty State -->
        <div id="state-empty" class="state">
          <div class="state-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
              <line x1="11" y1="8" x2="11" y2="14"/>
              <line x1="8" y1="11" x2="14" y2="11"/>
            </svg>
          </div>
          <h3>Search articles</h3>
          <p>Type a query or select a category to find relevant articles</p>
        </div>

        <!-- Loading Skeleton -->
        <div id="state-loading" class="state hidden">
          <div class="skeleton-list">
            <div class="skeleton-card">
              <div class="skeleton-line skeleton-line-sm"></div>
              <div class="skeleton-line skeleton-line-lg"></div>
              <div class="skeleton-line skeleton-line-md"></div>
              <div class="skeleton-line skeleton-line-xs"></div>
            </div>
            <div class="skeleton-card">
              <div class="skeleton-line skeleton-line-sm"></div>
              <div class="skeleton-line skeleton-line-lg"></div>
              <div class="skeleton-line skeleton-line-md"></div>
              <div class="skeleton-line skeleton-line-xs"></div>
            </div>
            <div class="skeleton-card">
              <div class="skeleton-line skeleton-line-sm"></div>
              <div class="skeleton-line skeleton-line-lg"></div>
              <div class="skeleton-line skeleton-line-md"></div>
              <div class="skeleton-line skeleton-line-xs"></div>
            </div>
          </div>
        </div>

        <!-- No Results State -->
        <div id="state-no-results" class="state hidden">
          <div class="state-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <path d="M16 16s-1.5-2-4-2-4 2-4 2"/>
              <line x1="9" y1="9" x2="9.01" y2="9"/>
              <line x1="15" y1="9" x2="15.01" y2="9"/>
            </svg>
          </div>
          <h3>No results found</h3>
          <p id="no-results-message">Try adjusting your search or browse a different category</p>
        </div>

        <!-- Results -->
        <div id="results" class="results hidden"></div>

      </div>
    </div>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
