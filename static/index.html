<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaaS Support Deflector</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="header-inner">
        <h1 class="header-title">SaaS Support Deflector</h1>
        <span class="health-indicator">
          <span class="health-dot" id="health-dot"></span>
          <span class="health-label" id="health-label">Checking...</span>
        </span>
      </div>
    </div>
  </header>

  <main class="container">
    <form id="search-form" class="search-form">
      <div class="search-row">
        <input
          type="text"
          id="search-input"
          class="search-input"
          placeholder="Search articles..."
          autocomplete="off"
          autofocus
        />
        <button type="submit" class="search-button" id="search-button" aria-label="Search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
      </div>
      <div class="search-controls">
        <select id="category-select" class="category-select">
          <option value="">All Categories</option>
        </select>
        <span id="result-count" class="result-count"></span>
      </div>
    </form>

    <section class="results-area" id="results-area">
      <div id="empty-state" class="empty-state">
        <p>Enter a query above to search articles</p>
      </div>
      <div id="loading-state" class="loading-state hidden">
        <p>Searching...</p>
      </div>
      <div id="error-state" class="error-state hidden"></div>
      <div id="results" class="results hidden"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
