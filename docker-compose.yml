version: '3.9'
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: saas-support-deflector-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    command: ["./qdrant", "--config-path", "/qdrant/config/production.yaml"]

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saas-support-deflector-app
    ports:
      - "8001:8001"
    environment:
      PORT: 8001
      HOST: 0.0.0.0
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ./src:/app/src
      - ./static:/app/static
    depends_on:
      - qdrant
